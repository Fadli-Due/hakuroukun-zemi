slam_gmapping:
  # ---- Frames ----
  base_frame: "base_link"
  odom_frame: "odom"
  map_frame:  "map"

  # IMPORTANT: must be true when running standalone SLAM so gmapping
  # publishes the map -> odom transform itself. If you ever switch to
  # amcl-based localization on a pre-built map, set this back to false
  # in that workflow. For RE-MAPPING this MUST stay true.
  tf_broadcast: true

  # ---- Topic (informational; the launch file does the actual remap) ----
  scan_topic: "/scan_multi"

  # ---- LiDAR range ----
  # Match the laserscan_multi_merger range in the bringup. The merger
  # already enforces range_min: 1.0 and range_max: 25.0 on /scan_multi,
  # so anything tighter than that is fine.
  maxUrange: 20.0          # max range used for scan matching (m)
  maxRange:  21.0          # max range used for map update (m)
  minimumScore: 50         # raised a bit; sim odom is clean so we can be strict

  # ---- Map resolution ----
  # 5 cm per cell. Same as warehouse_map.yaml so the new map drops in cleanly.
  delta: 0.05

  # ---- Update thresholds ----
  # Smaller values = more frequent map updates = sharper walls and cones.
  # Cheap in sim because odom is perfect.
  linearUpdate:  0.20      # update after every 20 cm of motion
  angularUpdate: 0.15      # update after every ~8.6 deg of rotation
  temporalUpdate: 1.0      # also update at least once per second
  mapUpdateInterval: 1.0   # publish /map at most once per second

  # ---- Motion model noise ----
  # In Gazebo the odom is essentially ground truth, so almost-zero noise
  # is correct. (On the real robot you would raise these.)
  srr: 0.01
  srt: 0.01
  str: 0.01
  stt: 0.01

  # ---- Particles ----
  particles: 50

  # ---- Map post-processing ----
  resampleThreshold: 0.5
  occ_thresh: 0.25         # slightly lower so thin cones get marked occupied

  # ---- Initial map size (the grid auto-expands as needed) ----
  # Warehouse is roughly 30 x 40 m, so a 50 m square is plenty to start.
  xmin: -25.0
  xmax:  25.0
  ymin: -25.0
  ymax:  25.0