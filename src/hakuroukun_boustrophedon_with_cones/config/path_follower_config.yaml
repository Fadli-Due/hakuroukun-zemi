pure_pursuit_hakuroukun:
  max_speed: 0.35
  min_speed: 0.18
  lookahead_distance: 0.8
  wheelbase: 1.0
  control_rate: 10
  max_search_ahead: 25
  goal_tolerance: 0.30
  steer_lpf: 0.45
  # How many path steps to skip when HOLD times out and the replanner
  # failed to produce a new path (static wall / map boundary).
  # 40 steps x 0.20m = 8m skip — clears a stuck corner turn.
  skip_on_timeout: 15

reverse:
  enable: true
  speed: 0.18
  max_duration: 2.5       # was 1.2 — backs up ~0.45m instead of 0.22m
  front_stop_range: 1.20
  front_clear_range: 1.0  # was 2.50 — static walls never reach 2.5m clearance
  front_fov_deg: 70
  angle_threshold_deg: 150
  stuck_time: 3.0
  progress_min: 0.04
  cooldown: 3.0
  max_hold_time: 15.0     # exposed here for easy tuning (was code-only default)