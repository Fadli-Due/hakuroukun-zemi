# amcl_params.yaml
# Loaded inside the amcl node tag so params go to /amcl/...
# Tuned for Hakuroukun warehouse simulation.

# ---- Coordinate frames ----
global_frame_id:  map
odom_frame_id:    odom
base_frame_id:    base_link

# ---- Map ----
use_map_topic:    true       # subscribe to /map topic (published by map_server)
first_map_only:   true       # don't re-init if /map updates

# ---- Initial pose ----
# Robot spawns at world (0,0,0).  gmapping was started from there too,
# so the map origin matches.  Tight covariance = fast convergence.
initial_pose_x:   0.0
initial_pose_y:   0.0
initial_pose_a:   0.0
initial_cov_xx:   0.10       # 0.32 m std dev — narrow because we know spawn point
initial_cov_yy:   0.10
initial_cov_aa:   0.05       # ~13 deg std dev

# ---- Particle filter ----
min_particles:    200
max_particles:    1000
kld_err:          0.05
kld_z:            0.99
resample_interval: 1

# ---- Update thresholds (how much robot must move before AMCL updates) ----
update_min_d:  0.15          # 15 cm linear
update_min_a:  0.25          # ~14 deg angular

# ---- Laser model ----
# likelihood_field: fast, works well for solid walls.  Good choice for sim.
laser_model_type:          likelihood_field
laser_max_beams:           30        # subsample the 150-beam merged scan for speed
laser_max_range:           20.0      # match merger maxRange
laser_min_range:           0.3       # match merger range_min
laser_z_hit:               0.90      # high because sim scans are clean
laser_z_rand:              0.05
laser_z_short:             0.05
laser_sigma_hit:           0.20      # 20 cm hit tolerance (covers cone width)
laser_likelihood_max_dist: 2.0       # search radius for likelihood field

# ---- Odometry motion model ----
# Using diff model for the Ackermann robot (standard approximation).
# In Gazebo, wheel odom is near-perfect, so noise params are small.
odom_model_type: diff
alpha1: 0.10    # rotation noise from rotation
alpha2: 0.10    # rotation noise from translation
alpha3: 0.05    # translation noise from translation
alpha4: 0.05    # translation noise from rotation

# ---- Misc ----
transform_tolerance:  0.20   # seconds; AMCL TF publish lag tolerance
recovery_alpha_slow:  0.001    # disable random particle injection in sim
recovery_alpha_fast:  0.001    #   (we trust the initial pose)
gui_publish_rate:     10.0   # rate for publishing particle cloud to RViz (Hz)
