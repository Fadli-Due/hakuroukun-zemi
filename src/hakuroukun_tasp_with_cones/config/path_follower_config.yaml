pure_pursuit_hakuroukun:
  max_speed: 0.45           # Maximum speed [m/s]
  min_speed: 0.20            # Minimum speed [m/s]
  #lookahead_distance: 1.0   # Lookahead distance [m]
  lookahead_min: 0.6  # Lookahead distance [m]
  lookahead_max: 1.2
  wheelbase: 1.0            # Wheelbase [m]
  control_rate: 10           # Control loop rate [Hz]
  kappa_max: 2.0

reverse:
  enable: true
  speed: 0.25            # reverse speed (m/s)
  max_duration: 2.0      # seconds (safety cap)
  #front_stop_range: 0.8  
  #front_clear_range: 1.2 
  front_stop_range: 0.7  # m (enter reverse if obstacle closer)
  front_clear_range: 1.2 # m (leave reverse when clear)
  front_fov_deg: 70      # degrees used for min range check
  angle_threshold_deg: 110
  stuck_time: 1.5        # seconds window for progress check
  progress_min: 0.05     # meters progress required to avoid "stuck"



