pure_pursuit_hakuroukun:
  max_speed: 0.35           # Maximum speed [m/s]
  min_speed: 0.25            # Minimum speed [m/s]
  #min_speed: -0.25             # Minimum speed [m/sa]
  #lookahead_distance: 1.0   # Lookahead distance [m]
  lookahead_distance: 0.7  # Lookahead distance [m]
  wheelbase: 1.0            # Wheelbase [m]
  control_rate: 10           # Control loop rate [Hz]

reverse:
  enable: true
  speed: 0.25            # reverse speed (m/s)
  max_duration: 2.0      # seconds (safety cap)
  #front_stop_range: 0.8  # m (enter reverse if obstacle closer)
  #front_clear_range: 1.2 # m (leave reverse when clear)
  front_stop_range: 0.9
  front_clear_range: 1.3 # m (leave reverse when clear)
  front_fov_deg: 90      # degrees used for min range check
  angle_threshold_deg: 100
  stuck_time: 1.5        # seconds window for progress check
  progress_min: 0.05     # meters progress required to avoid "stuck"
