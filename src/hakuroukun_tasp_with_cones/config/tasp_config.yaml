start_pose: [0, 0, 0]  # [x, y, theta]
camera_fov: 90           # Degrees
camera_range: 6          # Meters
map_resolution: 0.05     # Meters per cell
map_width: 4000          # Number of cells
map_height: 4000         # Number of cells
map_origin: [-100, -100]   # [x, y]
#tasp_cell_size: 1        # Size of TASP planning cells
tasp_cell_size: 0.5    # New size of TASP planning cells
inflated_tasp_cell: 2.0    # inflate TASP cell x times
tasp_goal_tolerance: 1.5 # Meters
wait_duration: 10.0       # Seconds to allow for map updates
rate_hz: 2               # Main loop rate

# Parameters for TASPPathPlanner
remove_btp_threshold_distance: 0.5 # Threshold for removing points near the chosen goal from BTP
sampling_resolution: 0.1     # Sampling resolution for checking area occupancy

# Parameters for cone zone creator
circular_region_radius: 5.5
duplicate_threshold: 2
sliding_window: 90
batch: 60

pattern:
  mode: lanes_then_edges           # switch to edges_then_lanes for perimeter-first
  heading_keep_window_deg: 20.0

weights:
  length: 1.2
  heading: 0.9
  lane_change: 1.1
  clearance: 0.5
  edge: 0.0                        # set ~0.6 when edges_then_lanes
  edge_distance_target: 0.35
  w_inward: 0.8   # tune later, start around 0.5–1.0


  