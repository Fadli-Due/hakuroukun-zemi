# --- Map & robot basics ---
start_pose: [0.0, 0.0, 0.0]        # [x, y, theta]
camera_fov: 90                      # deg (for viz only)
camera_range: 6.0                   # m   (for viz only)
map_resolution: 0.05                # m/cell
map_width: 4000
map_height: 4000
map_origin: [-100, -100]

# --- TASP core ---
tasp_cell_size: 0.6                 # initial cell size (planner can change this)
inflated_tasp_cell: 2.0             # footprint multiplier used by is_area_free
tasp_goal_tolerance: 1.5            # m
wait_duration: 10.0                 # s
sampling_resolution: 0.10           # m for area sampling

# --- Planner robustness (matches tasp_path_planner.py) ---
use_eight_connected: true           # allow diagonal escapes
unknown_is_blocked: false           # let planner step into unknown
max_footprint_radius_m: 0.6         # cap on square half-size in is_area_free
blocked_threshold: 80               # >= this value = blocked
relax_shrink_factor: 0.7            # extra shrink when planner relaxes checks

# --- Dynamic cell size (optional; ON recommended) ---
enable_dynamic_cell_size: true
base_cell_size_m: 0.6
min_cell_size_m: 0.5
max_cell_size_m: 1.0
narrow_clearance_m: 1.2
wide_clearance_m: 2.0
cellsize_hysteresis_m: 0.3
clearance_scan_radius_m: 2.5
dynamic_cell_min_dwell_s: 5.0       # hold size at least this long
dynamic_cell_replan_cooldown_s: 3.0
publish_debug_topics: true
sampling_resolution_factor: 0.25     # sampling_resolution = max(map_res, factor * cell_size)

# --- Main loop behavior (main.py) ---
rate_hz: 5
pause_on_cell_change: true
cell_change_delta_m: 0.15
cell_change_pause_s: 0.8
skip_goal_on_plan_fail: true
max_plan_failures: 2
halt_on_plan_fail: false             # don't hard-stop follower on A* hiccups

# --- Cone zone creator (keep your existing values if customized) ---
circular_region_radius: 5.5
duplicate_threshold: 2
sliding_window: 90
batch: 60